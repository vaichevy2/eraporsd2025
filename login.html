<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aplikasi Rapor</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        /* Animated Gradient Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(45deg, #61033b, #1e0fc9, #0c3ccc, #950cb8, #800080, #a23007, #051698, #0b066a, #08218f);
            background-size: 400% 400%;
            animation: gradientAnimation 30s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Login Card */
        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 40px;
        }

        .login-card h4 {
            color: #1a1a2e;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .login-card .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-label {
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-control {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #1e0fc9;
            box-shadow: 0 0 0 0.2rem rgba(30, 15, 201, 0.25);
        }

        .form-check-input {
            border-color: #ddd;
            margin-top: 0.3rem;
        }

        .form-check-input:checked {
            background-color: #1e0fc9;
            border-color: #1e0fc9;
        }

        .btn-login {
            background: linear-gradient(135deg, #1e0fc9, #0c3ccc);
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30, 15, 201, 0.4);
            color: white;
        }

        .footer-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            margin-top: 20px;
        }

        .error-message {
            color: #dc3545;
            font-size: 0.9rem;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: #28a745;
            font-size: 0.9rem;
            margin-top: 5px;
            display: none;
        }

        /* Fade-in animation for password fields */
        .fade-in-fields {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h4><i class="fas fa-graduation-cap"></i> Aplikasi Rapor</h4>
            <p class="subtitle">Kurikulum Merdeka SD - Deep Learning</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Masukkan username" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="remember" value="">
                    <label class="form-check-label" for="remember">
                        Ingat saya
                    </label>
                </div>

                <div class="text-end mb-3">
                    <a href="#" class="text-decoration-none" onclick="showForgotPasswordModal()">
                        <small>Lupa Password?</small>
                    </a>
                </div>

                <div id="errorMsg" class="error-message">
                    <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
                </div>

                <button type="submit" class="btn btn-login w-100">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>

                <button type="button" class="btn btn-outline-light w-100 mt-2" onclick="quickLogin()" style="display: none;">
                    <i class="fas fa-key"></i> Demo Login (admin)
                </button>

                <button type="button" class="btn btn-outline-warning w-100 mt-2" onclick="demoAccess()" style="display: none;">
                    <i class="fas fa-eye"></i> Demo Access (View App)
                </button>
            </form>

            <div class="footer-text">
                <small style="color: #000; font-weight: bold;">@2025.Cepi Kunaefi</small>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="forgotPasswordModalLabel">
                        <i class="fas fa-key"></i> Lupa Password
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted mb-3">Masukkan username dan email Anda untuk mereset password. Sistem akan memverifikasi data dengan data pengguna guru.</p>

                    <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event)">
                        <div class="mb-3">
                            <label for="fp_username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="fp_username" placeholder="Masukkan username Anda" required>
                        </div>

                        <div class="mb-3">
                            <label for="fp_email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="fp_email" placeholder="Masukkan email Anda" required>
                            <small class="text-muted">klik di luar area setelah input</small>
                        </div>

                        <div id="fp_errorMsg" class="error-message" style="display: none;">
                            <i class="fas fa-exclamation-circle"></i> <span id="fp_errorText"></span>
                        </div>

                        <div id="fp_successMsg" class="success-message" style="display: none;">
                            <i class="fas fa-check-circle"></i> <span id="fp_successText"></span>
                        </div>

                        <!-- New Password Fields (Hidden initially) -->
                        <div id="newPasswordFields" class="fade-in-fields" style="display: none;">
                            <hr>
                            <h6 class="text-success mb-3"><i class="fas fa-check-circle"></i> Data ditemukan! Masukkan password baru</h6>

                            <div class="mb-3">
                                <label for="fp_new_password" class="form-label">Password Baru</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="fp_new_password" placeholder="Masukkan password baru" required>
                                    <button class="btn btn-outline-secondary" type="button" id="toggleNewPassword">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="fp_confirm_password" class="form-label">Konfirmasi Password Baru</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="fp_confirm_password" placeholder="Konfirmasi password baru" required>
                                    <button class="btn btn-outline-secondary" type="button" id="toggleConfirmPassword">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div id="fp_password_errorMsg" class="error-message" style="display: none;">
                                <i class="fas fa-exclamation-circle"></i> <span id="fp_password_errorText"></span>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="submit" form="forgotPasswordForm" class="btn btn-primary" id="fp_submitBtn">
                        <i class="fas fa-paper-plane"></i> Kirim Permintaan Reset
                    </button>
                    <button type="button" class="btn btn-success" id="fp_resetBtn" style="display: none;" onclick="handleResetPassword()">
                        <i class="fas fa-save"></i> Reset Password
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB_NAME = "RaporDeepLearningDB";
        const DB_VERSION = 8;
        let dbInstance;

        // Daftar tabel yang hanya boleh punya 1 baris data (single entry)
        const SINGLE_ENTRY_STORES = ['sekolah', 'utility', 'dimensi', 'kaih'];

        // Initialize IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                // Cek dukungan browser
                if (!window.indexedDB) {
                    reject("Browser tidak mendukung IndexedDB");
                    return;
                }

                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    const stores = [
                        'sekolah', 'utility', 'students', 'teachers', 'subject_teachers',
                        'mapel', 'cptp', 'dimensi', 'kaih', 'nilai', 'ekskul',
                        'student_ekskul', 'kokurikuler', 'tema_ekskul', 'tema_kokurikuler', 'admins',
                        'kelompok_kokurikuler', 'siswa_kelompok_kokurikuler'
                    ];
                    stores.forEach(s => {
                        if (!db.objectStoreNames.contains(s)) {
                            const isSingleEntry = SINGLE_ENTRY_STORES.includes(s);
                            const auto = !isSingleEntry;
                            db.createObjectStore(s, { keyPath: 'id', autoIncrement: auto });
                        }
                    });
                };
                request.onsuccess = (e) => { dbInstance = e.target.result; resolve(dbInstance); };
                request.onerror = (e) => reject("Database Error: " + e.target.error);
            });
        }

        // Get data from IndexedDB
        function getFromDB(storeName, id) {
            return new Promise((resolve) => {
                const tx = dbInstance.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const req = id ? store.get(id) : store.getAll();
                req.onsuccess = () => resolve(req.result);
            });
        }

        // Save data to IndexedDB
        function saveToDB(storeName, data) {
            return new Promise((resolve) => {
                const tx = dbInstance.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).put(data);
                tx.oncomplete = () => resolve(true);
            });
        }

        // Authenticate user with username and password
        async function authenticateUser(username, password, remember = false) {
            console.log('Starting authentication for user:', username);

            if (!dbInstance) {
                console.log('Initializing database...');
                await initDB();
            }

            try {
                // Seed default admin and super admin if not exists
                console.log('Checking for default admin user...');
                const admins = await getFromDB('admins');
                console.log('Current admins:', admins);

                let adminExists = false;
                let superAdminExists = false;
                if (admins && admins.length > 0) {
                    const adminUser = admins.find(a => a.username === 'admin');
                    const superAdminUser = admins.find(a => a.username === 'vaichevy');

                    if (adminUser) {
                        adminExists = true;
                        console.log('Admin user found, checking password...');
                        if (adminUser.password !== 'admin') {
                            console.log('Updating admin password...');
                            adminUser.password = 'admin';
                            await saveToDB('admins', adminUser);
                        }
                    }

                    if (superAdminUser) {
                        superAdminExists = true;
                        console.log('Super admin user found');
                    }
                }

                if (!adminExists) {
                    console.log('Creating default admin user...');
                    await saveToDB('admins', {
                        username: 'admin',
                        password: 'admin',
                        level: 'Admin',
                        aktif: true,
                        last_login: null,
                        online: false
                    });
                }

                if (!superAdminExists) {
                    console.log('Creating default super admin user...');
                    await saveToDB('admins', {
                        username: 'vaichevy',
                        password: 'Cepi1978',
                        level: 'Super Admin',
                        aktif: true,
                        last_login: null,
                        online: false
                    });
                }

                // Authenticate
                console.log('Authenticating user...');
                const allAdmins = await getFromDB('admins');
                console.log('All admins for auth:', allAdmins);

                const found = allAdmins.find(a => String(a.username) === username && String(a.password) === password);
                console.log('Authentication result:', found ? 'SUCCESS' : 'FAILED');

                if (found) {
                    // Save remember-me token with ID
                    if (found.id) {
                        console.log('Saving user ID to localStorage:', found.id);
                        localStorage.setItem('rapor_remember_user_id', String(found.id));
                    }

                    // Store additional user data if remember is checked
                    if (remember) {
                        localStorage.setItem('rapor_remember_user', JSON.stringify({
                            id: found.id,
                            username: found.username,
                            level: found.level
                        }));
                    }

                    // Small delay to ensure localStorage is written, then redirect
                    setTimeout(() => {
                        console.log('Redirecting to rapor.html...');
                        window.location.href = 'rapor.html?page=dashboard';
                    }, 100);

                    return true;
                } else {
                    return false;
                }
            } catch (e) {
                console.error('Authentication error:', e);
                return false;
            }
        }

        // Handle login form submission
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const loginBtn = document.querySelector('.btn-login');

            // Disable button and show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Masuk...';

            try {
                const success = await authenticateUser(username, password, remember);

                if (!success) {
                    errorText.textContent = 'Username atau Password salah';
                    errorMsg.style.display = 'block';
                }
            } catch (e) {
                console.error('Login error:', e);
                errorText.textContent = 'Terjadi kesalahan saat login';
                errorMsg.style.display = 'block';
            } finally {
                // Re-enable button
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
            }
        }

        // Quick login with demo credentials
        async function quickLogin() {
            const success = await authenticateUser('admin', 'admin', true);

            if (!success) {
                const errorMsg = document.getElementById('errorMsg');
                const errorText = document.getElementById('errorText');
                errorText.textContent = 'Demo login gagal. Silakan coba manual.';
                errorMsg.style.display = 'block';
            }
        }

        // Demo access - direct navigation to rapor.html without authentication
        function demoAccess() {
            // Clear any existing session
            localStorage.removeItem('rapor_remember_user_id');
            localStorage.removeItem('rapor_remember_user');

            // Redirect to rapor.html with demo flag
            window.location.href = 'rapor.html?page=dashboard&demo=true';
        }

        // Check for auto-login on page load
        async function checkAutoLogin() {
            const rememberedId = localStorage.getItem('rapor_remember_user_id');
            if (rememberedId) {
                if (!dbInstance) {
                    await initDB();
                }
                try {
                    // Seed default admin and super admin if not exists
                    const admins = await getFromDB('admins');
                    let adminExists = false;
                    let superAdminExists = false;
                    if (admins && admins.length > 0) {
                        const adminUser = admins.find(a => a.username === 'admin');
                        const superAdminUser = admins.find(a => a.username === 'vaichevy');

                        if (adminUser) {
                            adminExists = true;
                            if (adminUser.password !== 'admin') {
                                adminUser.password = 'admin';
                                await saveToDB('admins', adminUser);
                            }
                        }

                        if (superAdminUser) {
                            superAdminExists = true;
                        }
                    }

                    if (!adminExists) {
                        await saveToDB('admins', {
                            username: 'admin',
                            password: 'admin',
                            level: 'Admin',
                            aktif: true,
                            last_login: null,
                            online: false
                        });
                    }

                    if (!superAdminExists) {
                        await saveToDB('admins', {
                            username: 'vaichevy',
                            password: 'Cepi1978',
                            level: 'Super Admin',
                            aktif: true,
                            last_login: null,
                            online: false
                        });
                    }

                    const remembered = await getFromDB('admins', parseInt(rememberedId));
                    if (remembered && remembered.id) {
                        // Auto-login successful, redirect to rapor.html
                        window.location.href = 'rapor.html?page=dashboard';
                    }
                } catch (e) {
                    console.log('Auto-login check failed:', e);
                }
            }
        }

        // Initialize DB and check auto-login on page load
        window.addEventListener('load', async () => {
            await initDB();
            await checkAutoLogin();
        });

        // Focus on first input
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('username').focus();
        });

        // Show forgot password modal
        function showForgotPasswordModal() {
            // Clear any previous messages
            document.getElementById('fp_errorMsg').style.display = 'none';
            document.getElementById('fp_successMsg').style.display = 'none';
            document.getElementById('fp_password_errorMsg').style.display = 'none';

            // Clear form fields
            document.getElementById('fp_username').value = '';
            document.getElementById('fp_email').value = '';
            document.getElementById('fp_new_password').value = '';
            document.getElementById('fp_confirm_password').value = '';

            // Hide password fields and reset buttons
            document.getElementById('newPasswordFields').style.display = 'none';
            document.getElementById('fp_submitBtn').style.display = 'inline-block';
            document.getElementById('fp_resetBtn').style.display = 'none';

            // Reset verification status
            window.isVerified = false;
            window.matchingUserForReset = null;

            // Show the modal
            const modal = new bootstrap.Modal(document.getElementById('forgotPasswordModal'));
            modal.show();

            // Add blur event listeners for automatic verification
            document.getElementById('fp_username').addEventListener('blur', checkAndVerifyUser);
            document.getElementById('fp_email').addEventListener('blur', checkAndVerifyUser);
        }

        // Check and verify user automatically when both fields are filled
        async function checkAndVerifyUser() {
            const username = document.getElementById('fp_username').value.trim();
            const email = document.getElementById('fp_email').value.trim();

            // Only proceed if both fields are filled and not already verified
            if (!username || !email || window.isVerified) {
                return;
            }

            // Hide previous messages
            document.getElementById('fp_errorMsg').style.display = 'none';
            document.getElementById('fp_successMsg').style.display = 'none';

            try {
                // Initialize database if not already done
                if (!dbInstance) {
                    await initDB();
                }

                // Get all admin users and filter for teachers (level = 'Guru')
                const allAdmins = await getFromDB('admins');
                const guruUsers = Array.isArray(allAdmins) ? allAdmins.filter(admin => admin.level === 'Guru') : [];

                // Find matching teacher user
                const matchingUser = guruUsers.find(guru =>
                    String(guru.username).toLowerCase() === username.toLowerCase() &&
                    String(guru.email).toLowerCase() === email.toLowerCase()
                );

                if (matchingUser) {
                    // Success - user found in teacher data, show password fields with animation
                    window.isVerified = true;
                    window.matchingUserForReset = matchingUser;

                    // Show success message
                    const successMsg = document.getElementById('fp_successMsg');
                    const successText = document.getElementById('fp_successText');
                    successText.textContent = 'Data ditemukan! Silakan masukkan password baru.';
                    successMsg.style.display = 'block';

                    // Hide the submit button and show reset button
                    document.getElementById('fp_submitBtn').style.display = 'none';
                    document.getElementById('fp_resetBtn').style.display = 'inline-block';

                    // Show password fields with fade animation
                    const passwordFields = document.getElementById('newPasswordFields');
                    passwordFields.style.display = 'block';

                    // Focus on the new password field
                    setTimeout(() => {
                        document.getElementById('fp_new_password').focus();
                    }, 600); // Wait for animation to complete

                    console.log('Teacher data found for password reset:', matchingUser.nama_pengguna || matchingUser.username);
                } else {
                    // User not found in teacher data - show error but don't prevent retry
                    const errorMsg = document.getElementById('fp_errorMsg');
                    const errorText = document.getElementById('fp_errorText');
                    errorText.textContent = 'Username dan email tidak ditemukan dalam data pengguna guru. Silakan periksa kembali data Anda.';
                    errorMsg.style.display = 'block';
                }

            } catch (error) {
                console.error('Error verifying user:', error);
                const errorMsg = document.getElementById('fp_errorMsg');
                const errorText = document.getElementById('fp_errorText');
                errorText.textContent = 'Terjadi kesalahan saat memverifikasi data. Silakan coba lagi.';
                errorMsg.style.display = 'block';
            }
        }

        // Handle forgot password form submission
        async function handleForgotPassword(event) {
            event.preventDefault();

            const username = document.getElementById('fp_username').value.trim();
            const email = document.getElementById('fp_email').value.trim();
            const errorMsg = document.getElementById('fp_errorMsg');
            const errorText = document.getElementById('fp_errorText');
            const successMsg = document.getElementById('fp_successMsg');
            const successText = document.getElementById('fp_successText');
            const submitBtn = document.querySelector('#forgotPasswordModal .btn-primary');

            // Hide previous messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Validate inputs
            if (!username || !email) {
                errorText.textContent = 'Username dan email harus diisi';
                errorMsg.style.display = 'block';
                return;
            }

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

            try {
                // Initialize database if not already done
                if (!dbInstance) {
                    await initDB();
                }

                // Get all admin users and filter for teachers (level = 'Guru')
                const allAdmins = await getFromDB('admins');
                const guruUsers = Array.isArray(allAdmins) ? allAdmins.filter(admin => admin.level === 'Guru') : [];

                // Find matching teacher user
                const matchingUser = guruUsers.find(guru =>
                    String(guru.username).toLowerCase() === username.toLowerCase() &&
                    String(guru.email).toLowerCase() === email.toLowerCase()
                );

                if (matchingUser) {
                    // Success - user found in teacher data, show password fields with animation
                    successText.textContent = 'Data ditemukan! Silakan masukkan password baru.';
                    successMsg.style.display = 'block';

                    // Store the matching user for password reset
                    window.matchingUserForReset = matchingUser;

                    // Hide the submit button and show reset button
                    document.getElementById('fp_submitBtn').style.display = 'none';
                    document.getElementById('fp_resetBtn').style.display = 'inline-block';

                    // Show password fields with fade animation
                    const passwordFields = document.getElementById('newPasswordFields');
                    passwordFields.style.display = 'block';

                    // Focus on the new password field
                    setTimeout(() => {
                        document.getElementById('fp_new_password').focus();
                    }, 600); // Wait for animation to complete

                    console.log('Teacher data found for password reset:', matchingUser.nama_pengguna || matchingUser.username);
                } else {
                    // User not found in teacher data
                    errorText.textContent = 'Username dan email tidak ditemukan dalam data pengguna guru. Silakan periksa kembali data Anda.';
                    errorMsg.style.display = 'block';
                }

            } catch (error) {
                console.error('Error processing forgot password:', error);
                errorText.textContent = 'Terjadi kesalahan saat memproses permintaan. Silakan coba lagi.';
                errorMsg.style.display = 'block';
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Kirim Permintaan Reset';
            }
        }

        // Handle password reset
        async function handleResetPassword() {
            const newPassword = document.getElementById('fp_new_password').value;
            const confirmPassword = document.getElementById('fp_confirm_password').value;
            const passwordErrorMsg = document.getElementById('fp_password_errorMsg');
            const passwordErrorText = document.getElementById('fp_password_errorText');
            const resetBtn = document.getElementById('fp_resetBtn');

            // Hide previous password error messages
            passwordErrorMsg.style.display = 'none';

            // Validate passwords
            if (!newPassword || !confirmPassword) {
                passwordErrorText.textContent = 'Password baru dan konfirmasi harus diisi';
                passwordErrorMsg.style.display = 'block';
                return;
            }

            if (newPassword !== confirmPassword) {
                passwordErrorText.textContent = 'Password baru dan konfirmasi tidak cocok';
                passwordErrorMsg.style.display = 'block';
                return;
            }

            if (newPassword.length < 6) {
                passwordErrorText.textContent = 'Password baru harus minimal 6 karakter';
                passwordErrorMsg.style.display = 'block';
                return;
            }

            // Disable button and show loading
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';

            try {
                // Update the user's password
                const userToUpdate = window.matchingUserForReset;
                if (!userToUpdate) {
                    passwordErrorText.textContent = 'Data pengguna tidak ditemukan. Silakan coba lagi.';
                    passwordErrorMsg.style.display = 'block';
                    return;
                }

                userToUpdate.password = newPassword;
                await saveToDB('admins', userToUpdate);

                // Success - show success message and close modal
                const successMsg = document.getElementById('fp_successMsg');
                const successText = document.getElementById('fp_successText');
                successText.textContent = 'Password berhasil direset! Anda dapat login dengan password baru.';
                successMsg.style.display = 'block';

                // Hide password fields
                document.getElementById('newPasswordFields').style.display = 'none';

                console.log('Password reset successful for teacher:', userToUpdate.nama_pengguna || userToUpdate.username);

                // Auto-close modal after 3 seconds
                setTimeout(() => {
                    bootstrap.Modal.getInstance(document.getElementById('forgotPasswordModal')).hide();
                }, 3000);

            } catch (error) {
                console.error('Error resetting password:', error);
                passwordErrorText.textContent = 'Terjadi kesalahan saat mereset password. Silakan coba lagi.';
                passwordErrorMsg.style.display = 'block';
            } finally {
                // Re-enable button
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-save"></i> Reset Password';
            }
        }

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = this.querySelector('i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        });

        // Toggle new password visibility in forgot password modal
        document.getElementById('toggleNewPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('fp_new_password');
            const toggleIcon = this.querySelector('i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        });

        // Toggle confirm password visibility in forgot password modal
        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('fp_confirm_password');
            const toggleIcon = this.querySelector('i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        });
    </script>
