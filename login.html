<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aplikasi Rapor</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        /* Animated Gradient Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(45deg, #61033b, #1e0fc9, #0c3ccc, #950cb8, #800080, #a23007, #051698, #0b066a, #08218f);
            background-size: 400% 400%;
            animation: gradientAnimation 30s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Login Card */
        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 40px;
        }

        .login-card h4 {
            color: #1a1a2e;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .login-card .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-label {
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-control {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #1e0fc9;
            box-shadow: 0 0 0 0.2rem rgba(30, 15, 201, 0.25);
        }

        .form-check-input {
            border-color: #ddd;
            margin-top: 0.3rem;
        }

        .form-check-input:checked {
            background-color: #1e0fc9;
            border-color: #1e0fc9;
        }

        .btn-login {
            background: linear-gradient(135deg, #1e0fc9, #0c3ccc);
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30, 15, 201, 0.4);
            color: white;
        }

        .footer-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            margin-top: 20px;
        }

        .error-message {
            color: #dc3545;
            font-size: 0.9rem;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: #28a745;
            font-size: 0.9rem;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h4><i class="fas fa-graduation-cap"></i> Aplikasi Rapor</h4>
            <p class="subtitle">Kurikulum Merdeka SD - Deep Learning</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Masukkan username" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="remember" value="">
                    <label class="form-check-label" for="remember">
                        Ingat saya
                    </label>
                </div>

                <div id="errorMsg" class="error-message">
                    <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
                </div>

                <button type="submit" class="btn btn-login w-100">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>

                <button type="button" class="btn btn-outline-light w-100 mt-2" onclick="quickLogin()">
                    <i class="fas fa-key"></i> Demo Login (admin)
                </button>
            </form>

            <div class="footer-text">
                <small>Gunakan akun admin untuk masuk</small><br>
                <small>Username: <strong>admin</strong> | Password: <strong>rapor123</strong></small>
            </div>
        </div>
    </div>

    <script>
        const DB_NAME = "RaporDeepLearningDB";
        const DB_VERSION = 7;
        let dbInstance;

        // Daftar tabel yang hanya boleh punya 1 baris data (single entry)
        const SINGLE_ENTRY_STORES = ['sekolah', 'utility', 'dimensi', 'kaih'];

        // Initialize IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                // Cek dukungan browser
                if (!window.indexedDB) {
                    reject("Browser tidak mendukung IndexedDB");
                    return;
                }

                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    const stores = [
                        'sekolah', 'utility', 'students', 'teachers', 'subject_teachers',
                        'mapel', 'cptp', 'dimensi', 'kaih', 'nilai', 'ekskul',
                        'student_ekskul', 'kokurikuler', 'tema_ekskul', 'tema_kokurikuler', 'admins',
                        'kelompok_kokurikuler', 'siswa_kelompok_kokurikuler'
                    ];
                    stores.forEach(s => {
                        if (!db.objectStoreNames.contains(s)) {
                            const isSingleEntry = SINGLE_ENTRY_STORES.includes(s);
                            const auto = !isSingleEntry;
                            db.createObjectStore(s, { keyPath: 'id', autoIncrement: auto });
                        }
                    });
                };
                request.onsuccess = (e) => { dbInstance = e.target.result; resolve(dbInstance); };
                request.onerror = (e) => reject("Database Error: " + e.target.error);
            });
        }

        // Get data from IndexedDB
        function getFromDB(storeName, id) {
            return new Promise((resolve) => {
                const tx = dbInstance.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const req = id ? store.get(id) : store.getAll();
                req.onsuccess = () => resolve(req.result);
            });
        }

        // Save data to IndexedDB
        function saveToDB(storeName, data) {
            return new Promise((resolve) => {
                const tx = dbInstance.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).put(data);
                tx.oncomplete = () => resolve(true);
            });
        }

        // Authenticate user with username and password
        async function authenticateUser(username, password, remember = false) {
            if (!dbInstance) {
                await initDB();
            }

            try {
                // Seed default admin if DB is empty or admin user has wrong password
                const admins = await getFromDB('admins');
                let adminExists = false;
                if (admins && admins.length > 0) {
                    const adminUser = admins.find(a => a.username === 'admin');
                    if (adminUser) {
                        adminExists = true;
                        if (adminUser.password !== 'rapor123') {
                            adminUser.password = 'rapor123';
                            await saveToDB('admins', adminUser);
                        }
                    }
                }
                if (!adminExists) {
                    await saveToDB('admins', { username: 'admin', password: 'rapor123', level: 'Super Admin' });
                }

                // Authenticate
                const allAdmins = await getFromDB('admins');
                const found = allAdmins.find(a => String(a.username) === username && String(a.password) === password);

                if (found) {
                    // Save remember-me token with ID
                    if (found.id) {
                        localStorage.setItem('rapor_remember_user_id', String(found.id));
                    }
                    
                    // Store additional user data if remember is checked
                    if (remember) {
                        localStorage.setItem('rapor_remember_user', JSON.stringify({
                            id: found.id,
                            username: found.username,
                            level: found.level
                        }));
                    }

                    // Small delay to ensure localStorage is written, then redirect
                    setTimeout(() => {
                        window.location.href = 'rapor.html?page=datapengguna';
                    }, 100);
                    
                    return true;
                } else {
                    return false;
                }
            } catch (e) {
                console.error(e);
                return false;
            }
        }

        // Handle login form submission
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const loginBtn = document.querySelector('.btn-login');

            // Disable button and show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Masuk...';

            try {
                const success = await authenticateUser(username, password, remember);

                if (!success) {
                    errorText.textContent = 'Username atau Password salah';
                    errorMsg.style.display = 'block';
                }
            } catch (e) {
                console.error('Login error:', e);
                errorText.textContent = 'Terjadi kesalahan saat login';
                errorMsg.style.display = 'block';
            } finally {
                // Re-enable button
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
            }
        }

        // Quick login with demo credentials
        async function quickLogin() {
            const success = await authenticateUser('admin', 'rapor123', true);
            
            if (!success) {
                const errorMsg = document.getElementById('errorMsg');
                const errorText = document.getElementById('errorText');
                errorText.textContent = 'Demo login gagal. Silakan coba manual.';
                errorMsg.style.display = 'block';
            }
        }

        // Check for auto-login on page load
        async function checkAutoLogin() {
            const rememberedId = localStorage.getItem('rapor_remember_user_id');
            if (rememberedId) {
                if (!dbInstance) {
                    await initDB();
                }
                try {
                    // Seed default admin if DB is empty or admin user has wrong password
                    const admins = await getFromDB('admins');
                    let adminExists = false;
                    if (admins && admins.length > 0) {
                        const adminUser = admins.find(a => a.username === 'admin');
                        if (adminUser) {
                            adminExists = true;
                            if (adminUser.password !== 'rapor123') {
                                adminUser.password = 'rapor123';
                                await saveToDB('admins', adminUser);
                            }
                        }
                    }
                    if (!adminExists) {
                        await saveToDB('admins', { username: 'admin', password: 'rapor123', level: 'Super Admin' });
                    }

                    const remembered = await getFromDB('admins', parseInt(rememberedId));
                    if (remembered && remembered.id) {
                        // Auto-login successful, redirect to rapor.html
                        window.location.href = 'rapor.html?page=datapengguna';
                    }
                } catch (e) {
                    console.log('Auto-login check failed:', e);
                }
            }
        }

        // Initialize DB and check auto-login on page load
        window.addEventListener('load', async () => {
            await initDB();
            await checkAutoLogin();
        });

        // Focus on first input
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('username').focus();
        });
    </script>

</body>
</html>
